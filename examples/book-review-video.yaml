name: book-review-video
intent: |
  "阅界读书" 短视频生产流程。
  核心价值点：文案（script）和图片 prompt（image_prompts）——这两步决定了整支片子的质量，
  其余都是落地执行。
  风格：高级简陋感；红熊猫 IP 为视觉主角；语气克制不煽情；每集 2-3 分钟。

manifest:
  unit_type: segment
  unit_fields: [time, text, prompt, image, audio]

steps:
  - id: script
    intent: |
      写符合阅界调性的整篇文案（2-3 分钟，带时间戳提示）。
      涉及读完整本书做参考，token 量大；用 sub-agent 隔离避免污染主会话。
    method: skill:write-book-review-script
    dispatch: subagent
    autonomy: ask
    produces: "{run.dir}/script.md"

  - id: segment
    intent: 把整篇文案按语义和节奏切段，初始化 manifest.units（每段带时间戳和正文）
    method: claude-code
    autonomy: report
    consumes: "{run.dir}/script.md"
    produces: "{run.dir}/manifest.yaml"

  - id: image_prompts
    intent: 为每段文案写一句图片 prompt，确保红熊猫 IP 视觉一致性和"高级简陋感"
    method: skill:write-image-prompt
    autonomy: ask
    iterates_over: units

  - id: generate_images
    intent: 调用 Imagen 出图。串行以确保风格一致性
    method: script
    autonomy: auto
    iterates_over: units
    command: "python scripts/gen_image.py --prompt '{unit.prompt}' --output {run.dir}/images/{unit.id}.png"

  - id: tts
    intent: 每段文案配音。可并行，声线独立无互相影响
    method: script
    autonomy: auto
    iterates_over: units
    parallelism: 4
    command: "python scripts/tts.py --text '{unit.text}' --output {run.dir}/audio/{unit.id}.mp3"

  - id: assemble
    intent: 把图片、音频按 segment 顺序合成最终视频
    method: script
    autonomy: report
    consumes: "{run.dir}/manifest.yaml"
    produces: "{run.dir}/final.mp4"
    command: "python scripts/assemble.py --manifest {run.dir}/manifest.yaml --output {run.dir}/final.mp4"
